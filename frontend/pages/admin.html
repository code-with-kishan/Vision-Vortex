<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="admin.html" class="active"><i class="bi bi-shield-lock me-2"></i>Admin Panel</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <h2 class="mb-4">Admin Panel - All Users</h2>
    <div class="table-responsive">
      <table class="table table-hover bg-white card-vv">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Farm</th><th>Joined</th><th></th></tr></thead>
        <tbody id="userTableBody"><tr><td colspan="6" class="text-center text-muted">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
  async function init() {
    const user = await requireLogin();
    if (user.role !== "admin") {
      showToast("You are not allowed to view this page", true);
      setTimeout(() => (window.location.href = "dashboard.html"), 1000);
      return;
    }
    loadUsers();
  }

  async function loadUsers() {
    try {
      const res = await apiRequest("/users");
      document.getElementById("userTableBody").innerHTML = res.data.map((u) => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge bg-secondary">${u.role}</span></td>
          <td>${u.farm_name || "-"}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
          <td><button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})"><i class="bi bi-trash"></i></button></td>
        </tr>`).join("");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  async function deleteUser(id) {
    if (!confirm("Delete this user account?")) return;
    try {
      await apiRequest(`/users/${id}`, "DELETE");
      showToast("User deleted");
      loadUsers();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

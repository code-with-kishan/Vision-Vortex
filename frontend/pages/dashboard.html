<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html" class="active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="admin.html" id="adminLink" style="display:none;"><i class="bi bi-shield-lock me-2"></i>Admin Panel</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <!-- Main content -->
  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <h2>Welcome, <span id="userName">...</span> 👋</h2>
    <p class="text-muted">Here is a quick summary of your farm.</p>

    <div class="row g-3 mt-2" id="statCards">
      <!-- stat cards injected by JS -->
    </div>

    <div class="row mt-4 g-4">
      <div class="col-md-7">
        <div class="card card-vv p-3">
          <h6>Antimicrobial Usage - Last 6 Months</h6>
          <canvas id="usageChart" height="180"></canvas>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card card-vv p-3">
          <h6>Low Stock Items</h6>
          <ul class="list-group list-group-flush" id="lowStockList">
            <li class="list-group-item text-muted">Loading...</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="../js/api.js"></script>
<script>
  let currentUser = null;

  async function init() {
    currentUser = await requireLogin();
    document.getElementById("userName").textContent = currentUser.name;
    if (currentUser.role === "admin") {
      document.getElementById("adminLink").style.display = "block";
    }
    loadDashboard();
  }

  async function loadDashboard() {
    try {
      const res = await apiRequest("/dashboard");
      const d = res.data;

      document.getElementById("statCards").innerHTML = `
        <div class="col-md-3"><div class="stat-card green"><small>Total Animals</small><h3>${d.totalAnimals}</h3></div></div>
        <div class="col-md-3"><div class="stat-card blue"><small>Healthy Animals</small><h3>${d.healthyAnimals}</h3></div></div>
        <div class="col-md-3"><div class="stat-card red"><small>Sick / Under Treatment</small><h3>${d.sickAnimals}</h3></div></div>
        <div class="col-md-3"><div class="stat-card amber"><small>Vaccination Due (7 days)</small><h3>${d.vaccinationDue}</h3></div></div>
        <div class="col-md-3"><div class="stat-card red"><small>Active Withdrawal Periods</small><h3>${d.activeWithdrawals}</h3></div></div>
        <div class="col-md-3"><div class="stat-card green"><small>Antimicrobials This Month</small><h3>${d.antimicrobialsThisMonth}</h3></div></div>
      `;

      // low stock list
      const lowStockList = document.getElementById("lowStockList");
      if (d.lowStockItems.length === 0) {
        lowStockList.innerHTML = '<li class="list-group-item text-muted">No low stock items 🎉</li>';
      } else {
        lowStockList.innerHTML = d.lowStockItems
          .map((i) => `<li class="list-group-item d-flex justify-content-between"><span>${i.item_name}</span><span class="badge bg-danger">${i.quantity} ${i.unit} left</span></li>`)
          .join("");
      }

      // chart
      const labels = d.monthlyMedicineUsage.map((m) => m.month);
      const values = d.monthlyMedicineUsage.map((m) => m.count);
      new Chart(document.getElementById("usageChart"), {
        type: "bar",
        data: { labels, datasets: [{ label: "Medicine records", data: values, backgroundColor: "#1e8449" }] },
        options: { responsive: true, plugins: { legend: { display: false } } },
      });
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytics | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html" class="active"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <h2 class="mb-4">Farm Analytics</h2>
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card card-vv p-3">
          <h6>Herd Health Distribution</h6>
          <canvas id="healthChart" height="220"></canvas>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card card-vv p-3">
          <h6>Antimicrobial Usage - Last 6 Months</h6>
          <canvas id="usageChart" height="220"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="../js/api.js"></script>
<script>
  async function init() {
    await requireLogin();
    try {
      const res = await apiRequest("/dashboard");
      const d = res.data;

      new Chart(document.getElementById("healthChart"), {
        type: "doughnut",
        data: {
          labels: ["Healthy", "Sick / Under Treatment"],
          datasets: [{ data: [d.healthyAnimals, d.sickAnimals], backgroundColor: ["#1e8449", "#c0392b"] }],
        },
      });

      new Chart(document.getElementById("usageChart"), {
        type: "bar",
        data: {
          labels: d.monthlyMedicineUsage.map((m) => m.month),
          datasets: [{ label: "Medicine records", data: d.monthlyMedicineUsage.map((m) => m.count), backgroundColor: "#2e86c1" }],
        },
        options: { plugins: { legend: { display: false } } },
      });
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

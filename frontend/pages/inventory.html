<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html" class="active"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Medicine Inventory</h2>
      <button class="btn btn-vv-primary" data-bs-toggle="modal" data-bs-target="#invModal" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> Add Item
      </button>
    </div>
    <div class="table-responsive">
      <table class="table table-hover bg-white card-vv">
        <thead><tr><th>Item</th><th>Quantity</th><th>Unit</th><th>Reorder Level</th><th>Status</th><th></th></tr></thead>
        <tbody id="invTableBody"><tr><td colspan="6" class="text-center text-muted">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="invModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Inventory Item</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="invForm">
          <input type="hidden" id="invId">
          <div class="mb-2"><label class="form-label">Item Name *</label><input class="form-control" id="itemName" required></div>
          <div class="row">
            <div class="col mb-2"><label class="form-label">Quantity</label><input type="number" class="form-control" id="quantity" value="0"></div>
            <div class="col mb-2"><label class="form-label">Unit</label><input class="form-control" id="unit" placeholder="bottles / tablets / ml"></div>
          </div>
          <div class="mb-2"><label class="form-label">Reorder Level</label><input type="number" class="form-control" id="reorderLevel" value="5"></div>
          <button type="submit" class="btn btn-vv-primary w-100 mt-2">Save</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
  let invModal, editingId = null;

  async function init() {
    await requireLogin();
    invModal = new bootstrap.Modal(document.getElementById("invModal"));
    loadInventory();
  }

  async function loadInventory() {
    try {
      const res = await apiRequest("/inventory");
      const tbody = document.getElementById("invTableBody");
      if (res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No items in inventory yet.</td></tr>';
        return;
      }
      tbody.innerHTML = res.data.map((i) => `
        <tr>
          <td>${i.item_name}</td>
          <td>${i.quantity}</td>
          <td>${i.unit}</td>
          <td>${i.reorder_level}</td>
          <td>${i.quantity <= i.reorder_level ? '<span class="badge bg-danger">Low Stock</span>' : '<span class="badge bg-success">OK</span>'}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick='openEditModal(${JSON.stringify(i)})'><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${i.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join("");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("modalTitle").textContent = "Add Inventory Item";
    document.getElementById("invForm").reset();
  }

  function openEditModal(i) {
    editingId = i.id;
    document.getElementById("modalTitle").textContent = "Edit Inventory Item";
    document.getElementById("itemName").value = i.item_name;
    document.getElementById("quantity").value = i.quantity;
    document.getElementById("unit").value = i.unit;
    document.getElementById("reorderLevel").value = i.reorder_level;
    invModal.show();
  }

  document.getElementById("invForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const payload = {
      itemName: document.getElementById("itemName").value,
      quantity: document.getElementById("quantity").value,
      unit: document.getElementById("unit").value,
      reorderLevel: document.getElementById("reorderLevel").value,
    };
    try {
      if (editingId) {
        await apiRequest(`/inventory/${editingId}`, "PUT", payload);
        showToast("Item updated");
      } else {
        await apiRequest("/inventory", "POST", payload);
        showToast("Item added");
      }
      invModal.hide();
      loadInventory();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  async function deleteItem(id) {
    if (!confirm("Delete this item?")) return;
    try {
      await apiRequest(`/inventory/${id}`, "DELETE");
      showToast("Deleted");
      loadInventory();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animal Management | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html" class="active"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Animal Management</h2>
      <button class="btn btn-vv-primary" data-bs-toggle="modal" data-bs-target="#animalModal" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> Add Animal
      </button>
    </div>

    <input type="text" id="searchBox" class="form-control mb-3" placeholder="Search by name, tag or breed..." style="max-width:350px;">

    <div class="table-responsive">
      <table class="table table-hover bg-white card-vv">
        <thead><tr><th>Tag</th><th>Name</th><th>Species/Breed</th><th>Age</th><th>Gender</th><th>Health</th><th></th></tr></thead>
        <tbody id="animalTableBody"><tr><td colspan="7" class="text-center text-muted">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="animalModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Add Animal</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="animalForm">
          <input type="hidden" id="animalId">
          <div class="mb-2"><label class="form-label">Animal Tag *</label><input class="form-control" id="animalTag" required></div>
          <div class="mb-2"><label class="form-label">Name</label><input class="form-control" id="name"></div>
          <div class="mb-2"><label class="form-label">Species *</label>
            <select class="form-select" id="species" required>
              <option>Cow</option><option>Buffalo</option><option>Goat</option><option>Sheep</option><option>Poultry</option><option>Other</option>
            </select>
          </div>
          <div class="mb-2"><label class="form-label">Breed</label><input class="form-control" id="breed"></div>
          <div class="row">
            <div class="col mb-2"><label class="form-label">Age</label><input type="number" class="form-control" id="age"></div>
            <div class="col mb-2"><label class="form-label">Weight (kg)</label><input type="number" class="form-control" id="weight"></div>
          </div>
          <div class="mb-2"><label class="form-label">Gender</label>
            <select class="form-select" id="gender"><option>Female</option><option>Male</option></select>
          </div>
          <div class="mb-2"><label class="form-label">Health Status</label>
            <select class="form-select" id="healthStatus">
              <option>Healthy</option><option>Sick</option><option>Under Treatment</option><option>Critical</option>
            </select>
          </div>
          <button type="submit" class="btn btn-vv-primary w-100 mt-2">Save Animal</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
  let animalModal;
  let editingId = null;

  async function init() {
    await requireLogin();
    animalModal = new bootstrap.Modal(document.getElementById("animalModal"));
    loadAnimals();
  }

  async function loadAnimals(search = "") {
    try {
      const res = await apiRequest("/animals" + (search ? `?search=${encodeURIComponent(search)}` : ""));
      const tbody = document.getElementById("animalTableBody");

      if (res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No animals yet. Click "Add Animal" to get started.</td></tr>';
        return;
      }

      const badgeClass = {
        Healthy: "badge-healthy", Sick: "badge-sick", "Under Treatment": "badge-treatment", Critical: "badge-critical",
      };

      tbody.innerHTML = res.data.map((a) => `
        <tr>
          <td>${a.animal_tag}</td>
          <td>${a.name || "-"}</td>
          <td>${a.species} / ${a.breed || "-"}</td>
          <td>${a.age ?? "-"}</td>
          <td>${a.gender || "-"}</td>
          <td><span class="badge ${badgeClass[a.health_status] || "bg-secondary"}">${a.health_status}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick='openEditModal(${JSON.stringify(a)})'><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteAnimal(${a.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join("");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("modalTitle").textContent = "Add Animal";
    document.getElementById("animalForm").reset();
  }

  function openEditModal(animal) {
    editingId = animal.id;
    document.getElementById("modalTitle").textContent = "Edit Animal";
    document.getElementById("animalTag").value = animal.animal_tag;
    document.getElementById("name").value = animal.name || "";
    document.getElementById("species").value = animal.species;
    document.getElementById("breed").value = animal.breed || "";
    document.getElementById("age").value = animal.age || "";
    document.getElementById("weight").value = animal.weight || "";
    document.getElementById("gender").value = animal.gender || "Female";
    document.getElementById("healthStatus").value = animal.health_status;
    animalModal.show();
  }

  document.getElementById("animalForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const payload = {
      animalTag: document.getElementById("animalTag").value,
      name: document.getElementById("name").value,
      species: document.getElementById("species").value,
      breed: document.getElementById("breed").value,
      age: document.getElementById("age").value,
      weight: document.getElementById("weight").value,
      gender: document.getElementById("gender").value,
      healthStatus: document.getElementById("healthStatus").value,
    };
    try {
      if (editingId) {
        await apiRequest(`/animals/${editingId}`, "PUT", payload);
        showToast("Animal updated");
      } else {
        await apiRequest("/animals", "POST", payload);
        showToast("Animal added");
      }
      animalModal.hide();
      loadAnimals();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  async function deleteAnimal(id) {
    if (!confirm("Delete this animal? This cannot be undone.")) return;
    try {
      await apiRequest(`/animals/${id}`, "DELETE");
      showToast("Animal deleted");
      loadAnimals();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  let searchTimer;
  document.getElementById("searchBox").addEventListener("input", function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadAnimals(this.value), 300);
  });

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vaccination | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html" class="active"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Vaccination Tracking</h2>
      <button class="btn btn-vv-primary" data-bs-toggle="modal" data-bs-target="#vacModal" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> Schedule Vaccination
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover bg-white card-vv">
        <thead><tr><th>Animal</th><th>Vaccine</th><th>Given On</th><th>Next Due</th><th>Status</th><th></th></tr></thead>
        <tbody id="vacTableBody"><tr><td colspan="6" class="text-center text-muted">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="vacModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Schedule Vaccination</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form id="vacForm">
          <input type="hidden" id="vacId">
          <div class="mb-2"><label class="form-label">Animal *</label><select class="form-select" id="animalId" required></select></div>
          <div class="mb-2"><label class="form-label">Vaccine Name *</label><input class="form-control" id="vaccineName" required></div>
          <div class="mb-2"><label class="form-label">Given By</label><input class="form-control" id="givenBy"></div>
          <div class="row">
            <div class="col mb-2"><label class="form-label">Date Given *</label><input type="date" class="form-control" id="dateGiven" required></div>
            <div class="col mb-2"><label class="form-label">Next Due Date *</label><input type="date" class="form-control" id="nextDueDate" required></div>
          </div>
          <button type="submit" class="btn btn-vv-primary w-100 mt-2">Save</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
  let vacModal, editingId = null;

  async function init() {
    await requireLogin();
    vacModal = new bootstrap.Modal(document.getElementById("vacModal"));
    await loadAnimalsDropdown();
    loadVaccinations();
  }

  async function loadAnimalsDropdown() {
    const res = await apiRequest("/animals");
    const select = document.getElementById("animalId");
    select.innerHTML = res.data.length
      ? res.data.map((a) => `<option value="${a.id}">${a.name || a.animal_tag} (${a.species})</option>`).join("")
      : '<option value="">-- Please add an animal first --</option>';
  }

  function isDueSoon(dateStr) {
    const due = new Date(dateStr);
    const in7 = new Date();
    in7.setDate(in7.getDate() + 7);
    return due <= in7;
  }

  async function loadVaccinations() {
    try {
      const res = await apiRequest("/vaccinations");
      const tbody = document.getElementById("vacTableBody");
      if (res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No vaccinations scheduled yet.</td></tr>';
        return;
      }
      tbody.innerHTML = res.data.map((v) => `
        <tr>
          <td>${v.animal_name || v.animal_tag}</td>
          <td>${v.vaccine_name}</td>
          <td>${v.date_given?.slice(0,10)}</td>
          <td>${v.next_due_date?.slice(0,10)}</td>
          <td><span class="badge ${isDueSoon(v.next_due_date) ? "badge-duesoon" : "badge-ontrack"}">${isDueSoon(v.next_due_date) ? "Due Soon" : "On Track"}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick='openEditModal(${JSON.stringify(v)})'><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteVac(${v.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join("");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  function openAddModal() {
    editingId = null;
    document.getElementById("modalTitle").textContent = "Schedule Vaccination";
    document.getElementById("vacForm").reset();
  }

  function openEditModal(v) {
    editingId = v.id;
    document.getElementById("modalTitle").textContent = "Edit Vaccination";
    document.getElementById("animalId").value = v.animal_id;
    document.getElementById("vaccineName").value = v.vaccine_name;
    document.getElementById("givenBy").value = v.given_by || "";
    document.getElementById("dateGiven").value = v.date_given.slice(0,10);
    document.getElementById("nextDueDate").value = v.next_due_date.slice(0,10);
    vacModal.show();
  }

  document.getElementById("vacForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const payload = {
      animalId: document.getElementById("animalId").value,
      vaccineName: document.getElementById("vaccineName").value,
      givenBy: document.getElementById("givenBy").value,
      dateGiven: document.getElementById("dateGiven").value,
      nextDueDate: document.getElementById("nextDueDate").value,
    };
    try {
      if (editingId) {
        await apiRequest(`/vaccinations/${editingId}`, "PUT", payload);
        showToast("Vaccination updated");
      } else {
        await apiRequest("/vaccinations", "POST", payload);
        showToast("Vaccination scheduled");
      }
      vacModal.hide();
      loadVaccinations();
    } catch (err) {
      showToast(err.message, true);
    }
  });

  async function deleteVac(id) {
    if (!confirm("Delete this vaccination record?")) return;
    try {
      await apiRequest(`/vaccinations/${id}`, "DELETE");
      showToast("Deleted");
      loadVaccinations();
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

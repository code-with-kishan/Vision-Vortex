<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="d-flex">
  <div class="sidebar-vv p-3 no-print" style="width:230px;">
    <h5 class="text-white mb-4">🌱 Vision Vortex</h5>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="animals.html"><i class="bi bi-clipboard-data me-2"></i>Animals</a>
    <a href="medicines.html"><i class="bi bi-capsule me-2"></i>Medicine Records</a>
    <a href="vaccination.html"><i class="bi bi-calendar-check me-2"></i>Vaccination</a>
    <a href="inventory.html"><i class="bi bi-box-seam me-2"></i>Inventory</a>
    <a href="analytics.html"><i class="bi bi-bar-chart-line me-2"></i>Analytics</a>
    <a href="reports.html" class="active"><i class="bi bi-file-earmark-text me-2"></i>Reports</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a>
    <a href="#" id="logoutLink"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
  </div>

  <div class="flex-grow-1 p-4">
    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:1050;" class="no-print"></div>
    <div class="d-flex justify-content-between align-items-center mb-3 no-print">
      <h2>Reports</h2>
      <div>
        <select id="reportType" class="form-select d-inline-block w-auto me-2">
          <option value="antimicrobial-usage">Antimicrobial Usage Report</option>
          <option value="animals">Animal Report</option>
          <option value="vaccinations">Vaccination Report</option>
        </select>
        <button class="btn btn-vv-primary" onclick="loadReport()"><i class="bi bi-arrow-repeat"></i> Generate</button>
        <button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer"></i> Print / Save as PDF</button>
      </div>
    </div>

    <h4 id="reportTitle" class="mb-3">Antimicrobial Usage Report</h4>
    <p class="text-muted small">Generated on <span id="reportDate"></span></p>

    <div class="table-responsive">
      <table class="table table-bordered bg-white" id="reportTable">
        <thead id="reportHead"></thead>
        <tbody id="reportBody"><tr><td class="text-center text-muted">Click "Generate" to load a report.</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script>
  async function init() {
    await requireLogin();
    document.getElementById("reportDate").textContent = new Date().toLocaleDateString();
    loadReport();
  }

  const columnMap = {
    "antimicrobial-usage": [
      ["animal_name", "Animal"], ["medicine_name", "Medicine"], ["dosage", "Dosage"],
      ["vet_name", "Vet"], ["start_date", "Start Date"], ["end_date", "End Date"], ["withdrawal_end_date", "Withdrawal Ends"],
    ],
    animals: [
      ["animal_tag", "Tag"], ["name", "Name"], ["species", "Species"], ["breed", "Breed"], ["age", "Age"], ["health_status", "Health Status"],
    ],
    vaccinations: [
      ["animal_name", "Animal"], ["vaccine_name", "Vaccine"], ["date_given", "Given On"], ["next_due_date", "Next Due"], ["given_by", "Given By"],
    ],
  };

  const titleMap = {
    "antimicrobial-usage": "Antimicrobial Usage Report",
    animals: "Animal Report",
    vaccinations: "Vaccination Report",
  };

  async function loadReport() {
    const type = document.getElementById("reportType").value;
    document.getElementById("reportTitle").textContent = titleMap[type];
    try {
      const res = await apiRequest(`/reports/${type}`);
      const cols = columnMap[type];
      document.getElementById("reportHead").innerHTML = "<tr>" + cols.map((c) => `<th>${c[1]}</th>`).join("") + "</tr>";

      if (res.data.length === 0) {
        document.getElementById("reportBody").innerHTML = `<tr><td colspan="${cols.length}" class="text-center text-muted">No data available for this report.</td></tr>`;
        return;
      }

      document.getElementById("reportBody").innerHTML = res.data.map((row) => {
        return "<tr>" + cols.map((c) => {
          let val = row[c[0]];
          if (val && String(val).match(/^\d{4}-\d{2}-\d{2}/)) val = String(val).slice(0, 10);
          return `<td>${val ?? "-"}</td>`;
        }).join("") + "</tr>";
      }).join("");
    } catch (err) {
      showToast(err.message, true);
    }
  }

  document.getElementById("logoutLink").addEventListener("click", async (e) => {
    e.preventDefault();
    await apiRequest("/auth/logout", "POST");
    window.location.href = "../index.html";
  });

  init();
</script>
</body>
</html>

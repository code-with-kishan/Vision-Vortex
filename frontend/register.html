<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-vv"><div class="container"><a class="navbar-brand" href="index.html">🌱 Vision Vortex</a></div></nav>

<div id="toast-container" style="position:fixed; top:80px; right:20px; z-index:1050;"></div>

<div class="card card-vv login-card p-4">
  <h3 class="text-center mb-3">Create Account</h3>
  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">I am a</label>
      <select class="form-select" id="role">
        <option value="farmer">Farmer</option>
        <option value="vet">Veterinarian</option>
      </select>
    </div>
    <div class="mb-3"><label class="form-label">Full Name</label><input type="text" id="name" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Farm Name (optional)</label><input type="text" id="farmName" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Phone (optional)</label><input type="text" id="phone" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" minlength="6" required></div>
    <button type="submit" class="btn btn-vv-primary w-100">Register</button>
  </form>
  <p class="text-center mt-3 mb-0">Already have an account? <a href="login-farmer.html">Login here</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById("registerForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    try {
      const res = await apiRequest("/auth/register", "POST", {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value,
        farmName: document.getElementById("farmName").value,
        phone: document.getElementById("phone").value,
      });
      showToast("Account created! Redirecting...");
      setTimeout(() => (window.location.href = "pages/dashboard.html"), 800);
    } catch (err) {
      showToast(err.message, true);
    }
  });
</script>
</body>
</html>

<body>
<nav class="navbar navbar-expand-lg navbar-vv sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">🌱 Vision Vortex</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

      </ul>
    </div>
  </div>
</nav>

<div class="container py-5" style="max-width:600px;">
  <h1 class="mb-4">Contact Us</h1>
  <div id="toast-container" style="position:fixed; top:80px; right:20px; z-index:1050;"></div>
  <form id="contactForm">
    <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="4" required></textarea></div>
    <button type="submit" class="btn btn-vv-primary">Send Message</button>
  </form>
</div>

<footer class="vv-footer text-center"><div class="container"><small>🌱 Vision Vortex - Academic Project</small></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  // NOTE: this is just a demo contact form for the project.
  // It does not actually send an email anywhere - that would need
  // a mail service like Nodemailer, which we kept out of scope.
  document.getElementById("contactForm").addEventListener("submit", function (e) {
    e.preventDefault();
    showToast("Thanks! Your message has been noted (demo form).");
    this.reset();
  });
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Farmer Login | Vision Vortex</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-vv"><div class="container"><a class="navbar-brand" href="index.html">🌱 Vision Vortex</a></div></nav>

<div id="toast-container" style="position:fixed; top:80px; right:20px; z-index:1050;"></div>

<div class="card card-vv login-card p-4 text-center">
  <i class="bi bi-person-workspace fs-1 text-success mb-2"></i>
  <h3 class="mb-3">Farmer Login</h3>
  <form id="loginForm" class="text-start">
    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" required></div>
    <button type="submit" class="btn btn-vv-primary w-100">Login</button>
  </form>
  <p class="text-center mt-3 mb-0">New here? <a href="register.html">Create an account</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    try {
      const res = await apiRequest("/auth/login", "POST", {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      });

      // Make sure the person is using the correct login page for their role.
      // (e.g. a farmer should not log in from the admin page)
      const expectedRole = "farmer";
      if (expectedRole !== "admin" && res.user.role !== expectedRole) {
        showToast("This account is not registered as a " + expectedRole, true);
        return;
      }

      showToast("Login successful! Redirecting...");
      setTimeout(() => (window.location.href = "pages/dashboard.html"), 600);
    } catch (err) {
      showToast(err.message, true);
    }
  });
</script>
</body>
</html>
